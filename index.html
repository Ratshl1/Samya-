<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funny Question</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
        font-family:Arial,sans-serif;
        overflow:hidden;
    }

    .box{
        background:white;
        padding:40px;
        border-radius:25px;
        text-align:center;
        box-shadow:0 0 30px rgba(0,0,0,0.2);
    }

    h1{
        color:#444;
        margin-bottom:30px;
    }

    button{
        padding:12px 30px;
        font-size:18px;
        border:none;
        border-radius:15px;
        cursor:pointer;
        margin:10px;
        transition:0.2s;
    }

    #yesBtn{
        background:#4CAF50;
        color:white;
    }

    #noBtn{
        background:#f44336;
        color:white;
        position:absolute;
    }

    #message{
        margin-top:20px;
        font-size:24px;
        font-weight:bold;
        color:#4CAF50;
    }
</style>
</head>
<body>

<div class="box">
    <h1>Is samya a dumb little girl?</h1>

    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>

    <div id="message"></div>
</div>

<script>
const noBtn = document.getElementById("noBtn");

function moveButton() {
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

document.getElementById("yesBtn").addEventListener("click", () => {
    document.getElementById("message").innerHTML =
        "You have good eyes kidoo 😎";
});
</script>

</body>
</html>
